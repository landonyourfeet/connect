
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKCREAL Connect</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black:    #000000;
    --bg:       #0A0A0A;
    --surface:  #111111;
    --surface2: #181818;
    --surface3: #222222;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.13);
    --magenta:  #FF0058;
    --magenta2: #FF3380;
    --magenta-dim: rgba(255,0,88,0.12);
    --magenta-glow: rgba(255,0,88,0.35);
    --cyan:     #00C8FF;
    --cyan2:    #33D6FF;
    --cyan-dim: rgba(0,200,255,0.1);
    --cyan-glow: rgba(0,200,255,0.3);
    --accent:   #FF0058;
    --accent2:  #FF3380;
    --white:    #FFFFFF;
    --text:     #EFEFEF;
    --muted:    #666666;
    --muted2:   #888888;
    --danger:   #FF3B3B;
    --success:  #00E676;
    --info:     #00C8FF;
    --warn:     #FFB800;
    --card:     #111111;
    --sidebar:  #000000;
    --sidebar2: #111111;
    --radius:   6px;
    --radius-lg: 10px;
    --shadow:   0 1px 3px rgba(0,0,0,0.3);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
  }
  html, body, #root { height: 100%; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
  button { cursor: pointer; font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--magenta); }

  /* Layout */
  .layout { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 228px; min-width: 228px; background: var(--black); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .sidebar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 180px; background: radial-gradient(ellipse at -20% 0%, rgba(255,0,88,0.1) 0%, transparent 70%); pointer-events: none; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  /* Sidebar */
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); position: relative; }
  .sidebar-logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 800; letter-spacing: 0.3px; line-height: 1; }
  .sidebar-logo-text b { color: var(--white); }
  .sidebar-logo-text span { color: var(--magenta); }
  .sidebar-logo-sub { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; }
  .sidebar-section { padding: 14px 8px 4px; }
  .sidebar-section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); padding: 0 8px; margin-bottom: 5px; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--radius); color: var(--muted2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; background: none; width: 100%; text-align: left; position: relative; }
  .sidebar-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
  .sidebar-item.active { color: var(--white); background: var(--magenta-dim); border-color: rgba(255,0,88,0.2); }
  .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 25%; bottom: 25%; width: 2px; background: var(--magenta); border-radius: 0 2px 2px 0; box-shadow: 0 0 8px var(--magenta); }
  .sidebar-item .icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
  .sidebar-item:hover .icon, .sidebar-item.active .icon { opacity: 1; }
  .sidebar-item.active .icon { color: var(--magenta); }
  .sidebar-badge { margin-left: auto; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 99px; min-width: 18px; text-align: center; }
  .sidebar-count { margin-left: auto; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; background: var(--surface3); padding: 1px 6px; border-radius: 99px; }

  /* Top bar */
  .topbar { height: 52px; background: var(--black); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 20px; flex-shrink: 0; }
  .topbar-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: 0.3px; }
  .topbar-search { flex: 1; max-width: 340px; position: relative; }
  .topbar-search input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 12px 7px 33px; font-size: 13px; color: var(--text); outline: none; transition: all 0.2s; }
  .topbar-search input::placeholder { color: var(--muted); }
  .topbar-search input:focus { border-color: var(--magenta); box-shadow: 0 0 0 3px var(--magenta-dim); background: var(--surface2); }
  .topbar-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; }
  .topbar-actions { margin-left: auto; display: flex; gap: 7px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: none; transition: all 0.15s; white-space: nowrap; font-family: 'Barlow', sans-serif; letter-spacing: 0.02em; }
  .btn-primary { background: var(--magenta); color: #fff; box-shadow: 0 0 20px var(--magenta-glow); }
  .btn-primary:hover { background: var(--magenta2); box-shadow: 0 0 28px var(--magenta-glow); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,0.2); background: var(--surface); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #FF5555; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-icon { padding: 6px; width: 32px; height: 32px; border-radius: var(--radius); justify-content: center; }

  /* Table */
  .table-wrap { overflow: auto; flex: 1; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--black); border-bottom: 1px solid var(--border2); padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; position: sticky; top: 0; z-index: 1; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr.selected { background: var(--magenta-dim); }
  td { padding: 11px 14px; vertical-align: middle; }
  td.checkbox-cell { width: 44px; padding-left: 16px; }

  /* Avatar */
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }

  /* Tags */
  .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; font-family: 'Barlow', sans-serif; letter-spacing: 0.02em; white-space: nowrap; background: var(--surface3); color: var(--muted2); border: 1px solid var(--border2); }
  .tag.danger  { background: rgba(255,59,59,0.1); color: #FF6B6B; border-color: rgba(255,59,59,0.25); }
  .tag.success { background: rgba(0,230,118,0.08); color: #00E676; border-color: rgba(0,230,118,0.25); }
  .tag.info    { background: var(--cyan-dim); color: var(--cyan); border-color: rgba(0,200,255,0.25); }
  .tag.warn    { background: rgba(255,184,0,0.08); color: var(--warn); border-color: rgba(255,184,0,0.25); }
  .tag.magenta { background: var(--magenta-dim); color: var(--magenta2); border-color: rgba(255,0,88,0.25); }
  .tag.purple  { background: rgba(200,0,255,0.08); color: #DD66FF; border-color: rgba(200,0,255,0.25); }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 3px; }

  /* Stage pill */
  .stage { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }
  .stage-delinquent { background: rgba(255,59,59,0.1); color: #FF6B6B; border: 1px solid rgba(255,59,59,0.25); }
  .stage-resident   { background: rgba(0,230,118,0.08); color: #00E676; border: 1px solid rgba(0,230,118,0.2); }
  .stage-lead       { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(0,200,255,0.2); }
  .stage-default    { background: var(--surface3); color: var(--muted2); border: 1px solid var(--border2); }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; backdrop-filter: blur(4px); }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 740px; max-width: 96vw; background: var(--surface); border-left: 1px solid var(--border2); z-index: 101; display: flex; flex-direction: column; overflow: hidden; animation: slideIn 0.22s cubic-bezier(.16,1,.3,1); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .drawer-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; flex-shrink: 0; background: var(--black); position: relative; overflow: hidden; }
  .drawer-header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, var(--magenta), var(--cyan) 40%, transparent 75%); }
  .drawer-body { display: flex; flex: 1; overflow: hidden; }
  .drawer-timeline { flex: 1; overflow-y: auto; padding: 16px 20px; background: var(--surface); }
  .drawer-details { width: 240px; border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; background: var(--black); }

  /* Timeline */
  .timeline-tabs { display: flex; gap: 4px; padding: 0 0 13px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .timeline-tab { padding: 5px 13px; border-radius: var(--radius); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border: 1px solid transparent; background: none; transition: all 0.15s; font-family: 'Barlow', sans-serif; }
  .timeline-tab.active { background: var(--magenta-dim); color: var(--magenta2); border-color: rgba(255,0,88,0.2); }
  .timeline-tab:hover:not(.active) { background: var(--surface3); color: var(--text); }
  .note-composer { background: var(--surface2); border-radius: var(--radius); padding: 12px; margin-bottom: 16px; border: 1px solid var(--border2); transition: border-color 0.2s; }
  .note-composer:focus-within { border-color: var(--magenta); box-shadow: 0 0 0 2px var(--magenta-dim); }
  .note-composer textarea { width: 100%; background: none; border: none; outline: none; resize: none; font-size: 13px; color: var(--text); min-height: 64px; line-height: 1.6; }
  .note-composer textarea::placeholder { color: var(--muted); }
  .note-composer-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .activity-item { display: flex; gap: 10px; margin-bottom: 14px; }
  .activity-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; border: 1px solid var(--border2); background: var(--surface2); }
  .activity-dot.note      { border-color: rgba(0,200,255,0.25); background: var(--cyan-dim); }
  .activity-dot.call      { border-color: rgba(0,230,118,0.25); background: rgba(0,230,118,0.07); }
  .activity-dot.voicemail { border-color: rgba(255,184,0,0.25); background: rgba(255,184,0,0.07); }
  .activity-dot.text      { border-color: rgba(255,0,88,0.25); background: var(--magenta-dim); }
  .activity-dot.email     { border-color: rgba(255,0,88,0.15); background: rgba(255,0,88,0.05); }
  .activity-content { flex: 1; min-width: 0; }
  .activity-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; flex-wrap: wrap; }
  .activity-type { font-size: 10px; font-weight: 700; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'Barlow Condensed', sans-serif; }
  .activity-time { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .activity-body { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .activity-empty { text-align: center; color: var(--muted); padding: 48px; font-size: 13px; }

  /* Details panel */
  .detail-section { margin-bottom: 22px; }
  .detail-section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .detail-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .detail-row { margin-bottom: 10px; }
  .detail-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .detail-value { font-size: 13px; color: var(--text); font-weight: 500; }
  .detail-input { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 9px; font-size: 13px; color: var(--text); outline: none; background: var(--surface2); font-family: 'Barlow', sans-serif; transition: border-color 0.15s; }
  .detail-input:focus { border-color: var(--magenta); box-shadow: 0 0 0 2px var(--magenta-dim); }
  .detail-select { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 9px; font-size: 13px; color: var(--text); outline: none; background: var(--surface2); font-family: 'Barlow', sans-serif; appearance: none; transition: border-color 0.15s; }
  .detail-select:focus { border-color: var(--magenta); }

  /* Person header */
  .person-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 800; color: var(--white); line-height: 1.1; letter-spacing: 0.3px; }
  .person-sub { font-size: 12px; color: var(--muted2); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .person-contact-links { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

  /* Tasks */
  .task-group-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 16px 20px 8px; border-bottom: 1px solid var(--border); }
  .task-item { display: flex; align-items: flex-start; gap: 11px; padding: 12px 20px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .task-item:hover { background: rgba(255,255,255,0.02); }
  .task-check { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--border2); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; }
  .task-check:hover { border-color: var(--magenta); }
  .task-check.done { background: var(--success); border-color: var(--success); }
  .task-info { flex: 1; }
  .task-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .task-title.done { text-decoration: line-through; color: var(--muted); }
  .task-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .task-due { font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .task-due.overdue { color: var(--danger); }
  .task-due.today   { color: var(--magenta); }
  .task-due.future  { color: var(--muted); }

  /* Content area */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .page-body { flex: 1; overflow: auto; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; border-bottom: 1px solid var(--border); background: var(--black); flex-shrink: 0; }
  .toolbar-count { font-size: 12px; color: var(--muted2); }

  /* Login */
  @keyframes borderNeon {
    0%   { box-shadow: 0 0 0 1.5px rgba(255,0,88,0.6),   0 0 24px 4px rgba(255,0,88,0.25),   0 24px 60px rgba(0,0,0,0.6); }
    14%  { box-shadow: 0 0 0 1.5px rgba(255,0,200,0.6),  0 0 24px 4px rgba(255,0,200,0.25),  0 24px 60px rgba(0,0,0,0.6); }
    28%  { box-shadow: 0 0 0 1.5px rgba(100,0,255,0.6),  0 0 24px 4px rgba(100,0,255,0.25),  0 24px 60px rgba(0,0,0,0.6); }
    42%  { box-shadow: 0 0 0 1.5px rgba(0,200,255,0.6),  0 0 24px 4px rgba(0,200,255,0.25),  0 24px 60px rgba(0,0,0,0.6); }
    57%  { box-shadow: 0 0 0 1.5px rgba(0,255,180,0.6),  0 0 24px 4px rgba(0,255,180,0.25),  0 24px 60px rgba(0,0,0,0.6); }
    71%  { box-shadow: 0 0 0 1.5px rgba(255,200,0,0.6),  0 0 24px 4px rgba(255,200,0,0.25),  0 24px 60px rgba(0,0,0,0.6); }
    85%  { box-shadow: 0 0 0 1.5px rgba(255,80,0,0.6),   0 0 24px 4px rgba(255,80,0,0.25),   0 24px 60px rgba(0,0,0,0.6); }
    100% { box-shadow: 0 0 0 1.5px rgba(255,0,88,0.6),   0 0 24px 4px rgba(255,0,88,0.25),   0 24px 60px rgba(0,0,0,0.6); }
  }
  @keyframes wingsGlow {
    0%   { filter: drop-shadow(0 0 10px rgba(255,0,88,0.8))   drop-shadow(0 0 3px rgba(255,0,88,0.5)); }
    14%  { filter: drop-shadow(0 0 10px rgba(255,0,200,0.8))  drop-shadow(0 0 3px rgba(255,0,200,0.5)); }
    28%  { filter: drop-shadow(0 0 10px rgba(100,0,255,0.8))  drop-shadow(0 0 3px rgba(100,0,255,0.5)); }
    42%  { filter: drop-shadow(0 0 10px rgba(0,200,255,0.8))  drop-shadow(0 0 3px rgba(0,200,255,0.5)); }
    57%  { filter: drop-shadow(0 0 10px rgba(0,255,180,0.8))  drop-shadow(0 0 3px rgba(0,255,180,0.5)); }
    71%  { filter: drop-shadow(0 0 10px rgba(255,200,0,0.8))  drop-shadow(0 0 3px rgba(255,200,0,0.5)); }
    85%  { filter: drop-shadow(0 0 10px rgba(255,80,0,0.8))   drop-shadow(0 0 3px rgba(255,80,0,0.5)); }
    100% { filter: drop-shadow(0 0 10px rgba(255,0,88,0.8))   drop-shadow(0 0 3px rgba(255,0,88,0.5)); }
  }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--black); position: relative; overflow: hidden; }
  .login-glow1 { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(255,0,88,0.07) 0%, transparent 70%); top: -200px; left: -150px; pointer-events: none; }
  .login-glow2 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(0,200,255,0.05) 0%, transparent 70%); bottom: -150px; right: -100px; pointer-events: none; }
  .login-card { background: var(--surface); border: 1px solid transparent; border-radius: var(--radius-lg); padding: 42px; width: 400px; position: relative; z-index: 1; animation: borderNeon 8s linear infinite; }
  .login-brand { text-align: center; margin-bottom: 30px; }
  .login-wings { display: block; width: 260px; margin: 0 auto 14px; animation: wingsGlow 8s linear infinite; }
  .login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; color: var(--white); letter-spacing: 0.5px; line-height: 1.1; margin-bottom: 4px; }
  .login-title em { color: var(--magenta); font-style: normal; }
  .login-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--muted2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em; }
  .form-input { width: 100%; border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 13px; font-size: 14px; color: var(--white); outline: none; font-family: 'Barlow', sans-serif; background: var(--surface2); transition: all 0.15s; }
  .form-input:focus { border-color: var(--magenta); box-shadow: 0 0 0 3px var(--magenta-dim); }
  .form-input::placeholder { color: var(--muted); }
  .form-error { color: var(--danger); font-size: 12px; margin-top: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 26px; width: 480px; max-width: 95vw; box-shadow: 0 0 60px rgba(0,0,0,0.7); animation: fadeIn 0.18s cubic-bezier(.16,1,.3,1); position: relative; overflow: hidden; }
  .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--magenta), var(--cyan)); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 800; color: var(--white); margin-bottom: 20px; letter-spacing: 0.3px; }

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; padding: 60px; }
  .empty-state-title { font-size: 15px; font-weight: 700; color: var(--muted2); font-family: 'Barlow Condensed', sans-serif; }
  .empty-state-sub { font-size: 13px; text-align: center; max-width: 280px; }

  /* Misc */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; justify-content: center; }
  .gap-2 { gap: 8px; }
  .ml-auto { margin-left: auto; }
  .text-muted { color: var(--muted); }
  .text-danger { color: var(--danger); }
  .text-sm { font-size: 12px; }
  .font-mono { font-family: 'DM Mono', monospace; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--surface3); border-top-color: var(--magenta); border-radius: 50%; animation: spin 0.55s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
  .checkbox { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .checkbox:hover { border-color: var(--magenta); }
  .checkbox.checked { background: var(--magenta); border-color: var(--magenta); box-shadow: 0 0 8px var(--magenta-glow); }

  /* Pagination */
  .pagination { display: flex; align-items: center; gap: 6px; padding: 12px 20px; border-top: 1px solid var(--border); background: var(--black); }
  .page-btn { padding: 4px 11px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 12px; font-weight: 600; background: var(--surface); color: var(--muted2); cursor: pointer; transition: all 0.15s; font-family: 'Barlow', sans-serif; }
  .page-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
  .page-btn.active { background: var(--magenta); border-color: var(--magenta); color: #fff; box-shadow: 0 0 12px var(--magenta-glow); }
  .page-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── API ───────────────────────────────────────────────────────────────────────
const API_BASE = '';
let authToken = localStorage.getItem('crm_token') || '';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (res.status === 401) { authToken = ''; localStorage.removeItem('crm_token'); window.location.reload(); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  return (parts[0]?.[0] || '') + (parts[parts.length - 1]?.[0] || '');
}

function avatarColor(name) {
  const colors = ['#D97706','#2563EB','#16A34A','#7C3AED','#DC2626','#0891B2','#DB2777','#059669'];
  let hash = 0;
  for (let c of (name||'')) hash = (hash * 31 + c.charCodeAt(0)) | 0;
  return colors[Math.abs(hash) % colors.length];
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  const now = new Date();
  const diff = now - dt;
  if (diff < 60000)     return 'just now';
  if (diff < 3600000)   return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000)  return Math.floor(diff / 3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getTagColor(name) {
  const n = name.toLowerCase();
  if (n.includes('eviction') || n.includes('failed') || n.includes('danger')) return 'danger';
  if (n.includes('completed') || n.includes('committed') || n.includes('payment plan')) return 'success';
  if (n.includes('in progress') || n.includes('attempt') || n.includes('call now')) return 'info';
  if (n.includes('human') || n.includes('manual') || n.includes('escalate')) return 'warn';
  if (n.includes('robot') || n.includes('grok') || n.includes('pause') || n.includes('stop')) return 'purple';
  return '';
}

function stageClass(stage) {
  if (!stage) return 'stage-default';
  const s = stage.toLowerCase();
  if (s === 'delinquent') return 'stage-delinquent';
  if (s === 'resident')   return 'stage-resident';
  if (s === 'lead')       return 'stage-lead';
  return 'stage-default';
}

// SVG icons
const Icons = {
  Users:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  Tasks:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,
  Calendar: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  Search:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Plus:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  X:        () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  Note:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>,
  Phone:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
  Mail:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
  Check:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
  Home:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  Filter:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
  List:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
  Voicemail:() => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="5.5" cy="11.5" r="4.5"/><circle cx="18.5" cy="11.5" r="4.5"/><line x1="5.5" y1="16" x2="18.5" y2="16"/></svg>,
  Star:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  ChevronR: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>,
  Refresh:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
};

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail]     = useState('');
  const [password, setPass]   = useState('');
  const [error, setError]     = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const { token, user } = await api('POST', '/api/auth/login', { email, password });
      authToken = token;
      localStorage.setItem('crm_token', token);
      onLogin(user);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="login-wrap">
      <div className="login-glow1" /><div className="login-glow2" />
      <div className="login-card">
        <div className="login-brand">
          <img src="wings.svg" alt="OKCREAL Wings" className="login-wings" />
          <div className="login-title">OKCREAL <em>Connect</em></div>
          <div className="login-sub">Moving You Up · Property Platform</div>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@okcreal.com" autoFocus />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={password} onChange={e => setPass(e.target.value)} placeholder="••••••••" />
          </div>
          {error && <div className="form-error">⚠ {error}</div>}
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:10, padding:'11px 16px', fontSize:14}} disabled={loading}>
            {loading ? <span className="spinner" style={{borderTopColor:'#fff'}} /> : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── ADD PERSON MODAL ──────────────────────────────────────────────────────────
function AddPersonModal({ onClose, onSaved }) {
  const [form, setForm] = useState({ firstName:'', lastName:'', phone:'', email:'', stage:'Lead' });
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  async function save() {
    setLoading(true);
    try {
      await api('POST', '/api/people', form);
      onSaved();
    } catch(e) { alert(e.message); }
    setLoading(false);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">Add New Contact</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div className="form-group" style={{margin:0}}>
            <label className="form-label">First Name</label>
            <input className="form-input" value={form.firstName} onChange={e=>set('firstName',e.target.value)} autoFocus />
          </div>
          <div className="form-group" style={{margin:0}}>
            <label className="form-label">Last Name</label>
            <input className="form-input" value={form.lastName} onChange={e=>set('lastName',e.target.value)} />
          </div>
        </div>
        <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.phone} onChange={e=>set('phone',e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={e=>set('email',e.target.value)} /></div>
        <div className="form-group">
          <label className="form-label">Stage</label>
          <select className="form-input" value={form.stage} onChange={e=>set('stage',e.target.value)}>
            <option>Lead</option><option>Resident</option><option>Delinquent</option><option>Past Client</option>
          </select>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={loading}>
            {loading ? 'Saving…' : 'Save Contact'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── PERSON DRAWER ─────────────────────────────────────────────────────────────
function PersonDrawer({ personId, onClose, onUpdated }) {
  const [person, setPerson]       = useState(null);
  const [activities, setActivities] = useState([]);
  const [tasks, setTasks]         = useState([]);
  const [tab, setTab]             = useState('all');
  const [noteText, setNoteText]   = useState('');
  const [saving, setSaving]       = useState(false);
  const [editStage, setEditStage] = useState(false);
  const [customFields, setCF]     = useState({});

  useEffect(() => { load(); }, [personId]);

  async function load() {
    try {
      const [pR, aR, tR, cfR] = await Promise.all([
        api('GET', `/api/people/${personId}`),
        api('GET', `/api/activities?personId=${personId}&limit=100`),
        api('GET', `/api/tasks?personId=${personId}`),
        api('GET', '/api/custom-fields'),
      ]);
      setPerson(pR.person);
      setCF(cfR.customFields || []);
      setActivities(aR.activities || []);
      setTasks(tR.tasks || []);
    } catch(e) { console.error(e); }
  }

  async function saveNote() {
    if (!noteText.trim()) return;
    setSaving(true);
    try {
      await api('POST', '/api/activities', { personId, type: 'note', body: noteText.trim() });
      setNoteText('');
      const aR = await api('GET', `/api/activities?personId=${personId}&limit=100`);
      setActivities(aR.activities || []);
    } catch(e) { alert(e.message); }
    setSaving(false);
  }

  async function updateField(key, value) {
    try {
      await api('PUT', `/api/people/${personId}`, { [key]: value });
      const pR = await api('GET', `/api/people/${personId}`);
      setPerson(pR.person);
      if (onUpdated) onUpdated();
    } catch(e) { alert(e.message); }
  }

  async function completeTask(taskId, done) {
    await api('PUT', `/api/tasks/${taskId}`, { completed: done });
    const tR = await api('GET', `/api/tasks?personId=${personId}`);
    setTasks(tR.tasks || []);
  }

  const filtered = tab === 'all'       ? activities
                 : tab === 'notes'     ? activities.filter(a => a.type === 'note')
                 : tab === 'calls'     ? activities.filter(a => a.type === 'call' || a.type === 'voicemail')
                 : tab === 'texts'     ? activities.filter(a => a.type === 'text')
                 : tab === 'emails'    ? activities.filter(a => a.type === 'email')
                 : activities;

  function activityIcon(type) {
    if (type === 'call')      return '📞';
    if (type === 'voicemail') return '📭';
    if (type === 'text')      return '💬';
    if (type === 'email')     return '📧';
    return '📝';
  }

  if (!person) return (
    <>
      <div className="drawer-overlay" onClick={onClose} />
      <div className="drawer"><div className="loading-wrap"><span className="spinner" /></div></div>
    </>
  );

  const balanceField = person.customFields?.['customPastDueBalance'];
  const payDateField = person.customFields?.['customDebtPaymentDate'];

  return (
    <>
      <div className="drawer-overlay" onClick={onClose} />
      <div className="drawer">
        {/* Header */}
        <div className="drawer-header">
          <div className="avatar" style={{background: avatarColor(person.name), width:46,height:46,fontSize:16}}>
            {initials(person.name)}
          </div>
          <div style={{flex:1}}>
            <div className="person-name">{person.name}</div>
            <div className="person-sub">
              {[person.phone, person.email].filter(Boolean).join(' · ') || 'No contact info'}
            </div>
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap',alignItems:'center'}}>
              <span className={`stage ${stageClass(person.stage)}`}>{person.stage || 'No Stage'}</span>
              {balanceField && (
                <span className="tag danger">💰 ${parseFloat(balanceField).toLocaleString()} past due</span>
              )}
              {(person.tags || []).slice(0,4).map(t => (
                <span key={t} className={`tag ${getTagColor(t)}`}>{t}</span>
              ))}
              {(person.tags || []).length > 4 && (
                <span className="tag">+{person.tags.length - 4} more</span>
              )}
            </div>
          </div>
          <button className="btn btn-icon btn-ghost" onClick={onClose}><Icons.X /></button>
        </div>

        {/* Body */}
        <div className="drawer-body">
          {/* Timeline */}
          <div className="drawer-timeline">
            <div className="timeline-tabs">
              {[['all','All'],['notes','Notes'],['calls','Calls'],['texts','Texts'],['emails','Emails']].map(([k,l]) => (
                <button key={k} className={`timeline-tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
              ))}
              <button className="timeline-tab" style={{marginLeft:'auto'}} onClick={load}><Icons.Refresh /></button>
            </div>

            {/* Note composer */}
            {tab === 'all' || tab === 'notes' ? (
              <div className="note-composer">
                <textarea
                  placeholder="Add a note…"
                  value={noteText}
                  onChange={e => setNoteText(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && e.metaKey && saveNote()}
                />
                <div className="note-composer-actions">
                  <button className="btn btn-ghost btn-sm" onClick={() => setNoteText('')}>Clear</button>
                  <button className="btn btn-primary btn-sm" onClick={saveNote} disabled={saving||!noteText.trim()}>
                    {saving ? 'Saving…' : 'Save Note'}
                  </button>
                </div>
              </div>
            ) : null}

            {/* Activity feed */}
            {filtered.length === 0 ? (
              <div className="activity-empty">No {tab === 'all' ? 'activity' : tab} recorded yet.</div>
            ) : filtered.map(a => (
              <div className="activity-item" key={a.id}>
                <div className={`activity-dot ${a.type}`}>{activityIcon(a.type)}</div>
                <div className="activity-content">
                  <div className="activity-meta">
                    <span className="activity-type">{a.type}</span>
                    {a.duration ? <span className="tag">{Math.floor(a.duration/60)}m {a.duration%60}s</span> : null}
                    <span className="activity-time">{formatDate(a.created_at)}</span>
                    {a.created_by_name && <span className="text-muted text-sm">by {a.created_by_name}</span>}
                  </div>
                  {a.body && <div className="activity-body">{a.body}</div>}
                  {a.recording_url && (
                    <div style={{marginTop:6}}>
                      <audio controls src={a.recording_url} style={{height:32,width:'100%'}} />
                    </div>
                  )}
                </div>
              </div>
            ))}

            {/* Tasks in timeline */}
            {tab === 'all' && tasks.length > 0 && (
              <>
                <div className="divider" />
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Open Tasks</div>
                {tasks.filter(t=>!t.completed).map(t => (
                  <div key={t.id} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}}>
                    <div className={`task-check ${t.completed?'done':''}`} onClick={() => completeTask(t.id, !t.completed)}>
                      {t.completed && <Icons.Check />}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:500}}>{t.title}</div>
                      {t.note && <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{t.note}</div>}
                      {t.due_date && <div style={{fontSize:11,color:'var(--accent)',marginTop:2}}>Due {new Date(t.due_date).toLocaleDateString()}</div>}
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>

          {/* Details sidebar */}
          <div className="drawer-details">
            <div className="detail-section">
              <div className="detail-section-title">Contact</div>
              <div className="detail-row">
                <div className="detail-label">Phone</div>
                <div className="detail-value font-mono">{person.phone || '—'}</div>
              </div>
              <div className="detail-row">
                <div className="detail-label">Email</div>
                <div className="detail-value" style={{wordBreak:'break-all'}}>{person.email || '—'}</div>
              </div>
            </div>

            <div className="detail-section">
              <div className="detail-section-title">Details</div>
              <div className="detail-row">
                <div className="detail-label">Stage</div>
                <select
                  className="detail-select"
                  value={person.stage || 'Lead'}
                  onChange={e => updateField('stage', e.target.value)}
                >
                  {['Lead','Resident','Delinquent','Past Client','Prospect'].map(s => <option key={s}>{s}</option>)}
                </select>
              </div>
              {balanceField && (
                <div className="detail-row">
                  <div className="detail-label">Past Due Balance</div>
                  <div className="detail-value text-danger">
                    ${parseFloat(balanceField).toLocaleString()}
                  </div>
                </div>
              )}
              {payDateField && (
                <div className="detail-row">
                  <div className="detail-label">Payment Commitment</div>
                  <div className="detail-value">{payDateField}</div>
                </div>
              )}
            </div>

            <div className="detail-section">
              <div className="detail-section-title">Background</div>
              <textarea
                className="detail-input"
                style={{minHeight:72,resize:'vertical'}}
                placeholder="Add background notes…"
                defaultValue={person.background || ''}
                onBlur={e => updateField('background', e.target.value)}
              />
            </div>

            <div className="detail-section">
              <div className="detail-section-title">Tags ({(person.tags||[]).length})</div>
              <div className="tags-wrap">
                {(person.tags || []).map(t => (
                  <span key={t} className={`tag ${getTagColor(t)}`}>{t}</span>
                ))}
                {!(person.tags||[]).length && <span className="text-muted text-sm">No tags</span>}
              </div>
            </div>

            <div className="detail-section">
              <div className="detail-section-title">Activity</div>
              <div className="detail-row">
                <div className="detail-label">Added</div>
                <div className="detail-value">{new Date(person.created).toLocaleDateString()}</div>
              </div>
              <div className="detail-row">
                <div className="detail-label">Last Updated</div>
                <div className="detail-value">{formatDate(person.updated)}</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ── PEOPLE PAGE ───────────────────────────────────────────────────────────────
function PeoplePage({ activeList, currentUser }) {
  const [people, setPeople]       = useState([]);
  const [total, setTotal]         = useState(0);
  const [loading, setLoading]     = useState(true);
  const [search, setSearch]       = useState('');
  const [selected, setSelected]   = useState(new Set());
  const [openId, setOpenId]       = useState(null);
  const [showAdd, setShowAdd]     = useState(false);
  const [page, setPage]           = useState(0);
  const LIMIT = 50;
  const searchRef = useRef(null);
  const searchTimer = useRef(null);

  useEffect(() => { setPage(0); setSelected(new Set()); }, [activeList, search]);
  useEffect(() => { load(); }, [activeList, search, page]);

  async function load() {
    setLoading(true);
    try {
      let url = `/api/people?limit=${LIMIT}&offset=${page * LIMIT}`;
      if (search)                    url += `&search=${encodeURIComponent(search)}`;
      if (activeList?.filters?.stage) url += `&stage=${encodeURIComponent(activeList.filters.stage)}`;
      if (activeList?.filters?.tags?.[0]) url += `&tag=${encodeURIComponent(activeList.filters.tags[0])}`;
      const r = await api('GET', url);
      setPeople(r.people || []);
      setTotal(r.total || 0);
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  function toggleSelect(id) {
    const s = new Set(selected);
    s.has(id) ? s.delete(id) : s.add(id);
    setSelected(s);
  }

  function toggleAll() {
    if (selected.size === people.length) setSelected(new Set());
    else setSelected(new Set(people.map(p => p.id)));
  }

  const pages = Math.ceil(total / LIMIT);

  return (
    <div className="page">
      <div className="topbar">
        <div className="topbar-title">{activeList ? activeList.name : 'All People'}</div>
        <div className="topbar-search">
          <span className="topbar-search-icon"><Icons.Search /></span>
          <input
            ref={searchRef}
            placeholder="Search name, phone, email…"
            value={search}
            onChange={e => { setSearch(e.target.value); }}
          />
        </div>
        <div className="topbar-actions">
          <button className="btn btn-ghost btn-sm" onClick={load}><Icons.Refresh /></button>
          <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}>
            <Icons.Plus /> Add Contact
          </button>
        </div>
      </div>

      {selected.size > 0 && (
        <div className="toolbar" style={{background:'#FFFBEB',borderColor:'#FDE68A'}}>
          <span className="toolbar-count" style={{color:'var(--accent)',fontWeight:600}}>{selected.size} selected</span>
          <button className="btn btn-ghost btn-sm">Tag</button>
          <button className="btn btn-ghost btn-sm">Assign</button>
          <button className="btn btn-danger btn-sm">Delete</button>
          <button className="btn btn-ghost btn-sm ml-auto" onClick={() => setSelected(new Set())}>Clear</button>
        </div>
      )}

      <div className="content">
        {loading ? (
          <div className="loading-wrap"><span className="spinner" /></div>
        ) : people.length === 0 ? (
          <div className="empty-state">
            <Icons.Users />
            <div className="empty-state-title">No contacts found</div>
            <div className="empty-state-sub">{search ? 'Try a different search' : 'Add your first contact to get started'}</div>
          </div>
        ) : (
          <>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style={{width:40,paddingLeft:16}}>
                      <div className={`checkbox ${selected.size===people.length?'checked':''}`} onClick={toggleAll}>
                        {selected.size===people.length && <Icons.Check />}
                      </div>
                    </th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Stage</th>
                    <th>Tags</th>
                    <th>Last Activity</th>
                    <th>Assigned</th>
                  </tr>
                </thead>
                <tbody>
                  {people.map(p => (
                    <tr key={p.id} className={selected.has(p.id)?'selected':''} onClick={() => setOpenId(p.id)}>
                      <td className="checkbox-cell" onClick={e=>{e.stopPropagation();toggleSelect(p.id)}}>
                        <div className={`checkbox ${selected.has(p.id)?'checked':''}`}>
                          {selected.has(p.id) && <Icons.Check />}
                        </div>
                      </td>
                      <td>
                        <div style={{display:'flex',alignItems:'center',gap:9}}>
                          <div className="avatar" style={{background:avatarColor(p.name)}}>
                            {initials(p.name)}
                          </div>
                          <div>
                            <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                            {p.email && <div style={{fontSize:11,color:'var(--muted)'}}>{p.email}</div>}
                          </div>
                        </div>
                      </td>
                      <td>
                        <span className="font-mono" style={{fontSize:13,color:'var(--text)'}}>{p.phone || '—'}</span>
                      </td>
                      <td><span className={`stage ${stageClass(p.stage)}`}>{p.stage || 'No Stage'}</span></td>
                      <td>
                        <div className="tags-wrap">
                          {(p.tags||[]).slice(0,2).map(t=>(
                            <span key={t} className={`tag ${getTagColor(t)}`}>{t}</span>
                          ))}
                          {(p.tags||[]).length > 2 && <span className="tag">+{p.tags.length-2}</span>}
                        </div>
                      </td>
                      <td style={{color:'var(--muted)',fontSize:12}}>{formatDate(p.updated)}</td>
                      <td style={{color:'var(--muted)',fontSize:12}}>{p.assignedName || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {pages > 1 && (
              <div className="pagination">
                <span className="text-muted text-sm">{total} contacts</span>
                <div style={{marginLeft:'auto',display:'flex',gap:4}}>
                  <button className="page-btn" onClick={()=>setPage(p=>p-1)} disabled={page===0}>← Prev</button>
                  <span className="page-btn active">{page+1} / {pages}</span>
                  <button className="page-btn" onClick={()=>setPage(p=>p+1)} disabled={page>=pages-1}>Next →</button>
                </div>
              </div>
            )}
          </>
        )}
      </div>

      {openId && (
        <PersonDrawer
          personId={openId}
          onClose={() => setOpenId(null)}
          onUpdated={load}
        />
      )}
      {showAdd && (
        <AddPersonModal
          onClose={() => setShowAdd(false)}
          onSaved={() => { setShowAdd(false); load(); }}
        />
      )}
    </div>
  );
}

// ── TASKS PAGE ────────────────────────────────────────────────────────────────
function TasksPage() {
  const [tasks, setTasks]   = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { load(); }, []);

  async function load() {
    setLoading(true);
    try {
      const r = await api('GET', '/api/tasks?completed=false');
      setTasks(r.tasks || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  async function complete(id) {
    await api('PUT', `/api/tasks/${id}`, { completed: true });
    setTasks(t => t.filter(x => x.id !== id));
  }

  const now = new Date();
  const today    = tasks.filter(t => { const d = new Date(t.due_date); return d.toDateString() === now.toDateString(); });
  const overdue  = tasks.filter(t => { const d = new Date(t.due_date); return d < now && d.toDateString() !== now.toDateString(); });
  const future   = tasks.filter(t => !t.due_date || new Date(t.due_date) > now && new Date(t.due_date).toDateString() !== now.toDateString());

  function TaskGroup({ title, items, accent }) {
    if (!items.length) return null;
    return (
      <>
        <div className="task-group-title" style={accent ? {color:accent} : {}}>
          {title} ({items.length})
        </div>
        {items.map(t => (
          <div className="task-item" key={t.id}>
            <div className={`task-check ${t.completed?'done':''}`} onClick={() => complete(t.id)}>
              {t.completed && <Icons.Check />}
            </div>
            <div className="task-info">
              <div className="task-title">{t.title}</div>
              <div className="task-meta">
                {t.first_name && <span>{t.first_name} {t.last_name}</span>}
                {t.assigned_name && <span> · {t.assigned_name}</span>}
                {t.note && <span style={{display:'block',marginTop:2,color:'var(--muted)'}}>{t.note}</span>}
              </div>
            </div>
            {t.due_date && (
              <div className={`task-due ${new Date(t.due_date) < now ? 'overdue' : 'today'}`}>
                {new Date(t.due_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
              </div>
            )}
          </div>
        ))}
      </>
    );
  }

  return (
    <div className="page">
      <div className="topbar">
        <div className="topbar-title">Tasks</div>
        <div className="topbar-actions">
          <button className="btn btn-ghost btn-sm" onClick={load}><Icons.Refresh /></button>
        </div>
      </div>
      <div className="page-body">
        {loading ? (
          <div className="loading-wrap"><span className="spinner" /></div>
        ) : tasks.length === 0 ? (
          <div className="empty-state">
            <Icons.Tasks />
            <div className="empty-state-title">All caught up!</div>
            <div className="empty-state-sub">No open tasks right now.</div>
          </div>
        ) : (
          <>
            <TaskGroup title="Overdue" items={overdue} accent="var(--danger)" />
            <TaskGroup title="Today"   items={today}   accent="var(--accent)" />
            <TaskGroup title="Upcoming" items={future} />
          </>
        )}
      </div>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function Sidebar({ currentPage, setPage, smartLists, activeList, setActiveList }) {
  return (
    <div className="sidebar">
      <div className="sidebar-logo">
        <div className="sidebar-logo-text"><b>OKCREAL</b> <span>Connect</span></div>
        <div className="sidebar-logo-sub">Property Management</div>
      </div>

      <div className="sidebar-section">
        <div className="sidebar-section-label">Workspace</div>
        <button className={`sidebar-item ${currentPage==='people'&&!activeList?'active':''}`}
          onClick={() => { setPage('people'); setActiveList(null); }}>
          <span className="icon"><Icons.Users /></span> All People
        </button>
        <button className={`sidebar-item ${currentPage==='tasks'?'active':''}`}
          onClick={() => setPage('tasks')}>
          <span className="icon"><Icons.Tasks /></span> Tasks
        </button>
      </div>

      {smartLists.length > 0 && (
        <div className="sidebar-section" style={{flex:1,overflow:'auto'}}>
          <div className="sidebar-section-label">Smart Lists</div>
          {smartLists.map(sl => (
            <button
              key={sl.id}
              className={`sidebar-item ${activeList?.id===sl.id?'active':''}`}
              onClick={() => { setPage('people'); setActiveList(sl); }}
            >
              <span className="icon"><Icons.List /></span>
              <span style={{flex:1,textAlign:'left'}}>{sl.name}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]           = useState(null);
  const [page, setPage]           = useState('people');
  const [smartLists, setLists]    = useState([]);
  const [activeList, setActiveList] = useState(null);
  const [checkingAuth, setCheck]  = useState(true);

  useEffect(() => { checkAuth(); }, []);
  useEffect(() => { if (user) loadSmartLists(); }, [user]);

  async function checkAuth() {
    if (!authToken) { setCheck(false); return; }
    try {
      const u = await api('GET', '/api/auth/me');
      setUser(u);
    } catch { authToken = ''; localStorage.removeItem('crm_token'); }
    setCheck(false);
  }

  async function loadSmartLists() {
    try {
      const r = await api('GET', '/api/smart-lists');
      setLists(r.smartLists || []);
    } catch {}
  }

  function logout() {
    authToken = ''; localStorage.removeItem('crm_token'); setUser(null);
  }

  if (checkingAuth) return <div className="loading-wrap" style={{minHeight:'100vh'}}><span className="spinner" /></div>;
  if (!user) return <LoginPage onLogin={setUser} />;

  return (
    <div className="layout">
      <Sidebar
        currentPage={page}
        setPage={setPage}
        smartLists={smartLists}
        activeList={activeList}
        setActiveList={setActiveList}
      />
      <div className="main">
        {page === 'people' && <PeoplePage activeList={activeList} currentUser={user} />}
        {page === 'tasks'  && <TasksPage />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
